schema_version: 1
sources:
  - source_id: macula-hebrew
    source_name: MACULA Hebrew Linguistic Datasets
    corpus: Hebrew and Aramaic Old Testament
    role: primary_discovery
    language: [hebrew, aramaic]
    edition: Westminster Leningrad Codex 4.20 as represented by MACULA Hebrew 25.08.11
    provider: Clear Bible / Biblica
    repository_or_location: https://github.com/Clear-Bible/macula-hebrew
    version_or_commit: 7ab368fcb14e4ad2e0f784138241a098fb516ec4
    download_date: 2026-07-11
    license: >-
      Composite dataset: MACULA aggregate, OSHB morphology, Westminster syntax, and
      Cherith glosses under CC BY 4.0; WLC text unrestricted/public-domain; SDBH fields
      included in the MACULA aggregate by permission from UBS
    license_url: https://github.com/Clear-Bible/macula-hebrew/blob/25.08.11/LICENSE.md
    license_review_status: complete
    required_attribution: >-
      Attribute "MACULA Hebrew Linguistic Datasets, available at
      https://github.com/Clear-Bible/macula-hebrew/"; preserve the WLC, Open Scriptures
      Hebrew Bible Project, Groves Center, Cherith Analytics, and UBS/SDBH notices
      applicable to fields used in any derivative
    redistribution_status: acquisition_instructions_only
    machine_processing_status: permitted
    raw_data_git_policy: ignored_local_only
    expected_files:
      - README.md
      - LICENSE.md
      - WLC/nodes/macula-hebrew.xml
    file_hashes:
      README.md: eab7e8334723e2819904049f040db5ea6fc939fa9093810b3636107fc693426f
      LICENSE.md: df45ba3224e7d6f9dba3ec8fd2d0b3f1d2febb2620147c889667886fccd4d8e1
      WLC/nodes/macula-hebrew.xml: 050c0616f7235ff86c69c31d77758442f2109e71178b2797f779dd087f7c5c65
    ingest_adapter: echoes.ingest.macula_hebrew
    acquisition:
      method: git_sparse
      version_label: 25.08.11
      upstream_commit: 7ab368fcb14e4ad2e0f784138241a098fb516ec4
      repository_url: https://github.com/Clear-Bible/macula-hebrew.git
      include_paths:
        - README.md
        - LICENSE.md
        - WLC/nodes
      expected_file_count: 932
    research_purpose: Primary token-level Hebrew and Aramaic text, morphology, syntax, semantics, and participant annotations.
    known_limitations:
      - The selected node representation has no formal XSD; the adapter pins and validates the observed structure.
      - MACULA normally prefers Qere where present, so separate Ketiv material is not complete in this representation.
      - Upstream issues document occasional missing xml:id values, split-word identifier inconsistencies, and a reported 1 Chronicles node-numbering problem; all are surfaced as validation findings.
      - Release 25.08.11 predates later NFC and combining-grapheme-joiner fixes; Project Echoes applies Unicode normalization only to derived forms and preserves source values.
      - The aggregate combines components with distinct attribution and downstream-publication conditions.
    notes:
      - Approved for reproducible local machine processing of release 25.08.11; raw files and full processed token tables remain Git-ignored and are not approved for public redistribution by project policy.
      - Release 25.08.11 is deliberately selected because it predates the separately licensed SILHA gloss injection in 2026 releases.
      - Limited metadata, checksums, aggregate statistics, validation findings, and non-textual schema information may be published with attribution.
      - The Git-ignored acquisition receipt records SHA-256 hashes and sizes for all 932 acquired files; the tracked manifest retains hashes for the three required inventory anchors.
      - All recorded hashes are canonical-byte SHA-256 values over the pinned commit's exact blob bytes, externally verified against raw.githubusercontent.com at commit 7ab368fcb14e4ad2e0f784138241a098fb516ec4 on 2026-07-11; acquisitions disable Git text conversion (core.autocrlf=false with a "* -text" attributes rule).
      - The earlier 2026-07-11 inventory hashed a Windows text-mode (CRLF) checkout and is superseded; those values are retained in the Milestone 2 ingestion report's superseded appendix and must never be used for verification.
    confirmed_information:
      - The official repository describes WLC text, OpenScriptures morphology, Westminster syntax, semantic, gloss, and participant layers and identifies each major component in its license.
      - Release 25.08.11 resolves to commit 7ab368fcb14e4ad2e0f784138241a098fb516ec4 and predates the SILHA integration.
      - The pinned source contains 929 chapter node files across 39 books plus one XInclude index; upstream tests assert 475911 morpheme records.
      - Local ingestion reproduced the upstream count exactly and validated 475911 source-to-token mappings across all 39 books and 929 chapters.
      - WLC text is unrestricted, OSHB and Groves syntax are CC BY 4.0, and Cherith glosses are CC BY 4.0.
      - The tag's MACULA license expressly applies CC BY 4.0 to the integrated dataset, including the enumerated SDBH-derived attributes used with UBS permission.
    unresolved_questions:
      - A public release of full processed token tables requires a separate field-level compatibility and attribution review, especially for SDBH-derived columns.
      - A future upgrade to a 2026 release requires a new review of SILHA terms and must not silently replace this pinned pre-SIL version.
    status: validated

  - source_id: macula-greek
    source_name: MACULA Greek Linguistic Datasets
    corpus: Greek New Testament
    role: primary_discovery
    language: [greek]
    edition: Nestle 1904 Greek New Testament as represented by the MACULA Greek 24.06.17 Nestle1904 dataset
    provider: Clear Bible / Biblica
    repository_or_location: https://github.com/Clear-Bible/macula-greek
    version_or_commit: b5b7ecec0882a3e9a609ecac99e157391e5d9b46
    download_date: 2026-07-11
    license: >-
      MACULA Greek Linguistic Datasets © 2022-2024 Biblica, Inc under CC BY 4.0 as the
      aggregate license; per the pinned LICENSE.md the aggregate includes the Nestle1904
      text (published 1904; transcription by Diego Santos, morphology by Ulrik
      Sandborg-Petersen, markup by Jonathan Robie), SBLGNT-derived data from Logos,
      MARBLE word-sense data used with permission, Berean Interlinear glosses placed in
      the public domain as of 2023-04-30, and Cherith glosses under CC BY 4.0
    license_url: https://github.com/Clear-Bible/macula-greek/blob/24.06.17/LICENSE.md
    license_review_status: complete
    required_attribution: >-
      Attribute "MACULA Greek Linguistic Datasets, available at
      https://github.com/Clear-Bible/macula-greek/"; preserve the Nestle1904, SBLGNT,
      UBS/MARBLE, Berean, and Cherith Analytics notices applicable to fields used in any
      derivative
    redistribution_status: acquisition_instructions_only
    machine_processing_status: permitted
    raw_data_git_policy: ignored_local_only
    expected_files:
      - README.md
      - LICENSE.md
      - Nestle1904/nodes/26-jude.xml
    file_hashes:
      README.md: 46bc2238caa8dcc0046798f7ce574fc402e460db54c1d396f45a85caf5a09501
      LICENSE.md: 41b49a2387b628a7bc772ddfae3a8af9dd8f4d4470b27b6132f6da6c73e4a557
      Nestle1904/nodes/26-jude.xml: cede4239434f5606a02ed729326666e7cabb2a0c8363aeb826dfb8d6ef0e4182
    ingest_adapter: echoes.ingest.macula_greek
    acquisition:
      method: git_sparse
      version_label: 24.06.17
      upstream_commit: b5b7ecec0882a3e9a609ecac99e157391e5d9b46
      repository_url: https://github.com/Clear-Bible/macula-greek.git
      include_paths:
        - README.md
        - LICENSE.md
        - Nestle1904/nodes
      expected_file_count: 29
    research_purpose: Primary token-level Greek New Testament text, morphology, syntax, semantics, and participant annotations.
    known_limitations:
      - The selected node representation has no formal XSD; the adapter pins and validates the observed structure.
      - The Nestle 1904 edition omits several later-numbered verses and includes the pericope adulterae inline; edition-level versification is recorded, not silently harmonized.
      - The aggregate combines components with distinct attribution and downstream-publication conditions; MARBLE word-sense fields are included by permission.
      - The SBLGNT representation in the same release documents unmapped nodes lacking Gloss, Louw-Nida, and Domain values and is not selected.
    notes:
      - Approved for reproducible local machine processing of release 24.06.17; raw files and full processed token tables remain Git-ignored and are not approved for public redistribution by project policy.
      - All recorded hashes are canonical-byte SHA-256 values, externally verified against raw.githubusercontent.com at commit b5b7ecec0882a3e9a609ecac99e157391e5d9b46 on 2026-07-11.
      - ADR 0010 records the edition selection, superseding the provisional SBLGNT v1.2 selection with the release's native Nestle1904 dataset.
      - The Git-ignored acquisition receipt records SHA-256 hashes and sizes for all 29 acquired files; the tracked manifest retains hashes for the three required inventory anchors.
    confirmed_information:
      - Release 24.06.17 resolves to commit b5b7ecec0882a3e9a609ecac99e157391e5d9b46 and is the newest tagged release as of 2026-07-11.
      - The pinned LICENSE.md applies CC BY 4.0 to the aggregate © 2022-2024 Biblica, Inc, supplies the exact attribution sentence, and enumerates component datasets and their terms as recorded above.
      - The pinned upstream test suite (test/test_nestle1904_nodes.py) asserts 137,779 leaf word nodes for the Nestle1904 nodes dataset.
      - The Nestle1904/nodes directory contains exactly 27 book files; every leaf node in sampled books carries xml:id, ref, morphId, UnicodeLemma, FunctionalTag, FormalTag, NormalizedForm, Unicode, Cat, and Gloss attributes.
      - The pinned Nestle1904 representation includes the pericope adulterae (JHN 7:53-8:11) inline with 190 leaf tokens.
      - Local ingestion reproduced the upstream count exactly and validated 137,779 source-to-token mappings across all 27 books and 260 chapters with zero errors; 17 scripted spot checks passed.
      - The Nestle 1904 edition omits fifteen declared verses and encodes the shorter ending of Mark at out-of-sequence verse MRK 16:99; both are verified at ingestion and flagged for human interpretation.
    unresolved_questions:
      - Which permission-only component fields (especially MARBLE-derived LN and LexDomain values) may appear in redistributable derived outputs?
    status: validated

