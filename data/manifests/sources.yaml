schema_version: 1
sources:
  - source_id: macula-hebrew
    source_name: MACULA Hebrew Linguistic Datasets
    corpus: Hebrew and Aramaic Old Testament
    role: primary_discovery
    language: [hebrew, aramaic]
    edition: Westminster Leningrad Codex base text as represented by MACULA
    provider: Clear Bible / Biblica
    repository_or_location: https://github.com/Clear-Bible/macula-hebrew
    version_or_commit: null
    download_date: null
    license: CC BY 4.0 for MACULA datasets; component-specific permissions require review
    license_url: https://github.com/Clear-Bible/macula-hebrew/blob/main/LICENSE.md
    license_review_status: in_progress
    required_attribution: MACULA Hebrew Linguistic Datasets, available at https://github.com/Clear-Bible/macula-hebrew/
    redistribution_status: acquisition_instructions_only
    machine_processing_status: permitted
    raw_data_git_policy: ignored_local_only
    expected_files: []
    file_hashes: {}
    ingest_adapter: null
    research_purpose: Primary token-level Hebrew and Aramaic text, morphology, syntax, semantics, and participant annotations.
    known_limitations:
      - The aggregate combines components with separate provenance and permission statements.
      - A release or commit and exact expected-file inventory have not been selected.
    notes:
      - The source remains unapproved until every activated component is audited separately.
    confirmed_information:
      - The official repository describes WLC text, OpenScriptures morphology, syntax, semantic, gloss, and participant layers.
      - The repository license identifies the MACULA datasets as CC BY 4.0 and supplies attribution text.
    unresolved_questions:
      - Does permission for every bundled semantic layer permit redistribution in Project Echoes derived tables?
      - Which tagged release or commit will be the reproducible acquisition target?
    status: under_review

  - source_id: macula-greek
    source_name: MACULA Greek Linguistic Datasets
