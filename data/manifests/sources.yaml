    version_or_commit: null
    download_date: null
    license: CC BY 4.0 for MACULA datasets; component-specific permissions require review
    license_url: https://github.com/Clear-Bible/macula-greek/blob/main/LICENSE.md
    license_review_status: in_progress
    required_attribution: MACULA Greek Linguistic Datasets, available at https://github.com/Clear-Bible/macula-greek/
    redistribution_status: acquisition_instructions_only
    machine_processing_status: permitted
    raw_data_git_policy: ignored_local_only
    expected_files: []
    file_hashes: {}
    ingest_adapter: null
    research_purpose: Primary token-level Greek New Testament text, morphology, syntax, semantics, and participant annotations.
    known_limitations:
      - The repository combines N1904, SBLGNT mappings, MARBLE data used with permission, and other layers with distinct notices.
      - The final SBLGNT branch and its annotation completeness relative to the N1904 representation require verification.
    notes:
      - The textual edition and every activated annotation layer must remain explicit in processed provenance.
    confirmed_information:
      - The official license lists syntax, morphology, word senses, frames, participant referents, synonyms, and mappings.
      - The repository license identifies the MACULA datasets as CC BY 4.0 and supplies attribution text.
    unresolved_questions:
      - Which branch and tagged MACULA release fully represents the provisional SBLGNT v1.2 selection?
      - Which permission-only component fields may appear in redistributable derived outputs?
    status: under_review

  - source_id: stepbible-data
    source_name: STEPBible Data
    corpus: Hebrew Bible, Greek Bible, lexicons, names, and versification resources
    role: supplementary_annotation
    language: [hebrew, aramaic, greek, english]
    edition: Multiple named datasets; exact activated files not yet selected
    provider: STEPBible / Tyndale House Cambridge
    repository_or_location: https://github.com/STEPBible/STEPBible-Data
    version_or_commit: null
    download_date: null
    license: CC BY 4.0 at repository level; file-level provenance review pending
    license_url: https://github.com/STEPBible/STEPBible-Data
    license_review_status: in_progress
    required_attribution: Credit STEP Bible and link to https://www.STEPBible.org/
    redistribution_status: acquisition_instructions_only
    machine_processing_status: permitted
    raw_data_git_policy: ignored_local_only
    expected_files: []
    file_hashes: {}
    ingest_adapter: null
    research_purpose: Supplement primary annotations with glosses, lexical mappings, semantic data, proper names, and versification crosswalk evidence.
    known_limitations:
      - The repository contains heterogeneous datasets with different upstream derivations and update schedules.
      - AI-authored descriptions in some resources are not primary linguistic evidence.
    notes:
      - Supplementary values must be stored in parallel and must never silently overwrite MACULA annotations.
    confirmed_information:
      - The official repository states CC BY 4.0 and requests credit to STEP Bible.
      - The repository publishes UTF-8 tab-separated datasets including tagged texts, lexicons, names, and versification data.
    unresolved_questions:
      - Which individual files measurably improve the core pipeline and satisfy item-level provenance review?
      - Which upstream text-edition restrictions apply to fields derived from commercial editions?
    status: under_review

  - source_id: septuagint-catss
    source_name: CATSS Morphologically Analyzed Septuagint and Parallel Hebrew-Greek Module
    corpus: Septuagint
    role: bridge
    language: [hebrew, greek]
    edition: Rahlfs 1935 Greek base with CATSS morphology; Stuttgart Hebrew base in the parallel module
    provider: CATSS / Center for Computer Analysis of Texts, University of Pennsylvania
    repository_or_location: https://ccat.sas.upenn.edu/rak/catss.html
    version_or_commit: null
    download_date: null
    license: CCAT User Agreement and fair-use conditions, version 050215
    license_url: https://ccat.sas.upenn.edu/gopher/text/religion/biblical/lxxmorph/0-user-declaration.txt
    license_review_status: in_progress
    required_attribution: Identify published-text rights holders, encoders, CATSS/CCAT, and the distribution source as documented
    redistribution_status: acquisition_instructions_only
    machine_processing_status: restricted
    raw_data_git_policy: ignored_local_only
    expected_files: []
    file_hashes: {}
    ingest_adapter: null
    research_purpose: Later Hebrew-Greek-New Testament triangulation and evaluation of Septuagint-mediated wording.
    known_limitations:
      - Legacy modules and revisions require separate provenance, tokenization, and redistribution review.
      - Versification and alignment differ from both the Masoretic Text and New Testament references.
    notes:
      - Activation is blocked until Hebrew and Greek primary corpus and known-link gates pass.
    confirmed_information:
      - CATSS produced morphologically analyzed Greek and Hebrew-Greek parallel materials based on a Rahlfs textual tradition.
      - CCAT materials use source-specific user declarations rather than one repository-wide open license.
    unresolved_questions:
      - Which CATSS modules are currently obtainable and what exact agreement governs each?
      - May any raw or derived aligned text be redistributed publicly?
    status: blocked

  - source_id: openbible-cross-references
    source_name: OpenBible.info Bible Cross References
    corpus: Canon-wide English-versification cross-reference graph
    role: benchmark
    language: [english]
    edition: Continuously updated downloadable archive; exact snapshot not yet pinned
    provider: OpenBible.info
    repository_or_location: https://www.openbible.info/labs/cross-references/
    version_or_commit: null
    download_date: null
    license: Creative Commons Attribution license stated on the source page; archive audit pending
    license_url: https://creativecommons.org/licenses/by/4.0/
    license_review_status: in_progress
    required_attribution: Attribute OpenBible.info and preserve source notices
    redistribution_status: acquisition_instructions_only
    machine_processing_status: permitted
    raw_data_git_policy: ignored_local_only
    expected_files: []
    file_hashes: {}
    ingest_adapter: null
    research_purpose: Broad known-link benchmark and exclusion layer, not original-language textual evidence.
    known_limitations:
      - Links mix themes, words, events, and people and are primarily verse-to-verse rather than passage ranges.
      - The page includes ESV quotations whose copyright is separate from the downloadable link graph.
    notes:
      - The data derives primarily from the Treasury of Scripture Knowledge with additional ranking signals.
    confirmed_information:
      - The official page describes approximately 340,000 cross references and provides a downloadable archive.
      - The page states a Creative Commons Attribution license unless otherwise indicated.
    unresolved_questions:
      - Does the downloadable archive contain any content beyond reference identifiers and vote counts?
      - What stable snapshot mechanism will pin a reproducible version?
    status: under_review

