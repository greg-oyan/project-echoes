# First governed versification-crosswalk instance (Milestone 4 Part 1).
#
# Scheme translation only: OSHB OSIS book identifiers to MACULA book codes.
# Both corpora represent WLC 4.20, so books map one-to-one with published-
# table confidence; verse-level rows remain empty because per-locus keying
# and confidence live in the K/Q locus registry. This file contains no
# biblical text; it is tracked as governance metadata.
schema_version: 1
source_scheme: oshb-morphhb-osis
target_scheme: macula-hebrew-wlc
provenance: >-
  Derived from echoes.align.book_codes.OSHB_TO_MACULA_BOOK; both schemes
  represent Westminster Leningrad Codex 4.20 (OSHB header revision
  2016.03.03; MACULA Hebrew edition statement). Verified empirically by the
  Milestone 4 Part 1 K/Q alignment: 1,108 of 1,108 K/Q verses frame-match at
  book, chapter, and verse.
book_mappings:
