schema_version: 1
experiment_name: lexical_baseline
description: Transparent lexical retrieval baseline governed here but implemented in Milestone 7.
research_question: Can transparent lexical methods recover held-out established relationships above simple overlap and random baselines?
input_sources: [macula-hebrew, macula-greek]
input_tables: [passages, known_relationships]
methods: [tfidf, bm25, rare_lemma, ordered_sequence]
parameters:
  configuration_status: governance_only
  adjacency_exclusion: true
  repeated_null_models_required: true
  required_null_families:
    - within_book_reassignment
    - frequency_preserving_synthetic_passages
  null_threshold_report_fields:
    - observed_candidate_count
    - mean_null_candidate_count
    - empirical_null_interval_95
    - observed_to_null_enrichment
    - empirical_tail_probability
    - estimated_empirical_false_discovery_rate
  rare_evidence_total_corpus_frequency_max: 3
  rare_evidence_requires_independent_co_signal: true
  hypergeometric_role: baseline_only
  empirical_calibration_priority: book_or_genre_conditioned_permutation
evaluation_dataset: known-link-benchmark
random_seed: 1729
expected_outputs: [ranked_candidates, benchmark_metrics, error_analysis]
acceptance_criteria:
  - Exceeds random and unweighted-overlap baselines on a held-out evaluation split
  - Every retrieved pair retains inspectable lexical evidence and run lineage
  - Repeated required null simulations report expected noise and empirical false-discovery estimates at every review threshold
  - A lemma or root at or below the configured rare-frequency threshold is review-eligible only with an independent co-signal
prohibited_claims:
  - Lexical similarity proves literary dependence
  - A high score proves authorial intent or scholarly novelty
status: planned
