minimum_pre_commit_version: "4.6.0"
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check
        language: system
        types_or: [python, pyi]
      - id: ruff-format-check
        name: ruff format check
        entry: uv run ruff format --check
        language: system
        types_or: [python, pyi]
      - id: mypy
        name: mypy
        entry: uv run mypy src
        language: system
        pass_filenames: false
      - id: pytest
        name: pytest
        entry: uv run pytest
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: validate-config
        name: validate project configuration
        entry: uv run echoes validate-config
        language: system
        pass_filenames: false
      - id: validate-sources
        name: validate source governance
        entry: uv run echoes validate-sources
        language: system
        pass_filenames: false
